name: Update Instagram DP

on:
  schedule:
    - cron: "0 * * * *"       # check every hour if it's time to run
  workflow_dispatch:            # manual trigger — always runs immediately

permissions:
  contents: write

jobs:
  update-dp:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if it's time to run
        id: schedule
        if: github.event_name == 'schedule'
        run: |
          if [ ! -f data/next_run.txt ]; then
            echo "No schedule found — running now"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          NEXT_RUN=$(cat data/next_run.txt)
          NOW=$(date +%s)
          if [ "$NOW" -ge "$NEXT_RUN" ]; then
            echo "It's time! (was scheduled for $(date -ud @$NEXT_RUN '+%H:%M UTC'))"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not yet — next run at $(date -ud @$NEXT_RUN '+%Y-%m-%d %H:%M UTC')"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Check proxy health
        id: proxycheck
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          # Squid responds with HTTP 400 (ERR_INVALID_URL) to a bare GET /.
          # Cloudflare returns 502/503 when the tunnel is broken — never 400.
          # Checking for exactly 400 confirms Squid itself is alive and reachable.
          if [ -n "$PROXY_URL" ]; then
            STATUS=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$PROXY_URL" 2>/dev/null) || STATUS="000"
            if [ "$STATUS" = "400" ]; then
              echo "Proxy is up (HTTP $STATUS) — routing traffic through proxy"
              echo "proxy_url=$PROXY_URL" >> $GITHUB_OUTPUT
            else
              echo "Proxy check failed (HTTP $STATUS) — running direct (no proxy)"
              echo "proxy_url=" >> $GITHUB_OUTPUT
            fi
          else
            echo "PROXY_URL not configured — running direct (no proxy)"
            echo "proxy_url=" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        run: pip install -r src/requirements.txt

      - name: Change profile picture
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        env:
          INSTA_USER: ${{ secrets.INSTA_USER }}
          INSTA_PASS: ${{ secrets.INSTA_PASS }}
          PROXY_URL: ${{ steps.proxycheck.outputs.proxy_url }}
        run: cd src && python main.py

      - name: Schedule next run
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        run: |
          # Random interval: 2–5 hours (7200–18000 seconds)
          # Guarantees 3+ DP changes per day during waking hours
          INTERVAL=$((RANDOM % 10800 + 7200))
          NEXT=$(( $(date +%s) + INTERVAL ))
          echo "$NEXT" > data/next_run.txt
          HOURS=$((INTERVAL / 3600))
          MINS=$(( (INTERVAL % 3600) / 60 ))
          echo "Next run in ${HOURS}h ${MINS}m — $(date -ud @$NEXT '+%Y-%m-%d %H:%M UTC')"

      - name: Commit changes
        if: github.event_name != 'schedule' || steps.schedule.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.txt data/session.json data/next_run.txt 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "update dp [skip ci]"
          git push
